services:
  ollama:
    build:
      context: ../..
      dockerfile: rendu/infra/Dockerfile
    container_name: ollama-techcorp
    expose:
      - "11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "ollama list | grep -q techcorp-finance"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: techcorp-frontend
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_URL=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama_data:
